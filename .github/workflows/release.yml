name: Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Must match razer_control_gui/Cargo.toml and packaging/fedora/razercontrol.spec —
  # bump all three together when cutting a release
  APP_VERSION: "0.3.0-rc6"

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            rpm-build \
            cargo \
            rust \
            dbus-devel \
            libusb1-devel \
            hidapi-devel \
            gtk4-devel \
            libadwaita-devel \
            glib2-devel \
            graphene-devel \
            pango-devel \
            cairo-devel \
            gdk-pixbuf2-devel \
            systemd-devel \
            git

      - name: Setup rpmbuild structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          VERSION=$(grep '^Version:' packaging/fedora/razercontrol.spec | awk '{print $2}')
          SRCDIR="razercontrol-revived-${VERSION}"
          mkdir -p "$SRCDIR"
          cp -r . "$SRCDIR/" 2>/dev/null || true
          tar -czf ~/rpmbuild/SOURCES/razercontrol-revived-${VERSION}.tar.gz "$SRCDIR"

      - name: Build RPM
        run: rpmbuild -bb packaging/fedora/razercontrol.spec

      - name: Collect RPM
        run: |
          mkdir -p rpm-output
          find ~/rpmbuild/RPMS -name "*.rpm" ! -name "*-debuginfo-*" ! -name "*-debugsource-*" -exec cp {} rpm-output/ \;

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: rpm-output/*.rpm

  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libhidapi-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libsystemd-dev \
            pkg-config \
            dpkg-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: razer_control_gui
        run: cargo build --release

      - name: Build .deb package
        run: |
          PKG="razercontrol-revived_${APP_VERSION}_amd64"
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/razercontrol
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          mkdir -p $PKG/etc/udev/rules.d
          mkdir -p $PKG/usr/lib/systemd/user

          cp razer_control_gui/target/release/razer-settings $PKG/usr/bin/
          cp razer_control_gui/target/release/razer-cli $PKG/usr/bin/
          cp razer_control_gui/target/release/daemon $PKG/usr/bin/razer-daemon
          cp razer_control_gui/data/devices/laptops.json $PKG/usr/share/razercontrol/
          cp razer_control_gui/data/gui/com.encomjp.razer-settings.desktop $PKG/usr/share/applications/
          cp razer_control_gui/data/gui/icon.png $PKG/usr/share/icons/hicolor/256x256/apps/com.github.encomjp.razercontrol.png
          cp razer_control_gui/data/udev/99-hidraw-permissions.rules $PKG/etc/udev/rules.d/
          cp razer_control_gui/data/services/systemd/razercontrol.service $PKG/usr/lib/systemd/user/

          cat > $PKG/DEBIAN/control << 'CTRL'
          Package: razercontrol-revived
          Version: ${APP_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libadwaita-1-0, libdbus-1-3, libhidapi-hidraw0
          Maintainer: nnfewl <nnfewl@users.noreply.github.com>
          Homepage: https://github.com/nnfewl/razer-control-revived
          Description: Razer Laptop Control - Revived
           A Linux userspace application to control Razer Blade laptops.
           No kernel modules (DKMS) required! Features a modern GTK4/libadwaita
           interface for fan control, power modes, keyboard lighting, and
           battery health optimization.
          CTRL
          # Remove leading whitespace from heredoc (DEBIAN/control must not have leading spaces on field names)
          sed -i 's/^          //' $PKG/DEBIAN/control
          # Substitute version variable
          sed -i "s/\${APP_VERSION}/${APP_VERSION}/" $PKG/DEBIAN/control

          cat > $PKG/DEBIAN/postinst << 'POSTINST'
          #!/bin/sh
          set -e
          udevadm control --reload-rules || true
          udevadm trigger || true
          # Enable systemd user service for all logged-in users
          if [ -d /run/systemd/system ]; then
            systemctl --global enable razercontrol.service || true
          fi
          POSTINST
          chmod 755 $PKG/DEBIAN/postinst

          cat > $PKG/DEBIAN/prerm << 'PRERM'
          #!/bin/sh
          set -e
          if [ -d /run/systemd/system ]; then
            systemctl --global disable razercontrol.service || true
          fi
          PRERM
          chmod 755 $PKG/DEBIAN/prerm

          dpkg-deb --build --root-owner-group $PKG

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: razercontrol-revived_*.deb

  check-nix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Update flake inputs
        run: nix flake update

      - name: Build with Nix
        run: nix build --print-build-logs

  build-tarball:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libhidapi-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libsystemd-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: razer_control_gui
        run: cargo build --release

      - name: Package tarball
        run: |
          DIST="razer-control-${APP_VERSION}-x86_64"
          mkdir -p $DIST/bin $DIST/share/applications $DIST/share/razercontrol $DIST/share/icons/hicolor/scalable/apps $DIST/systemd $DIST/udev
          cp razer_control_gui/target/release/razer-settings $DIST/bin/
          cp razer_control_gui/target/release/razer-cli $DIST/bin/
          cp razer_control_gui/target/release/daemon $DIST/bin/
          cp razer_control_gui/data/gui/com.encomjp.razer-settings.desktop $DIST/share/applications/
          cp razer_control_gui/data/gui/com.github.encomjp.razercontrol.svg $DIST/share/icons/hicolor/scalable/apps/
          cp razer_control_gui/data/devices/laptops.json $DIST/share/razercontrol/
          cp razer_control_gui/data/services/systemd/razercontrol.service $DIST/systemd/
          cp razer_control_gui/data/udev/99-hidraw-permissions.rules $DIST/udev/
          cp release/razer-control-0.2.0-x86_64/install.sh $DIST/install.sh
          # Update version in copied install script
          sed -i "s/0\.2\.0/${APP_VERSION}/g" $DIST/install.sh
          chmod +x $DIST/install.sh
          cp LICENSE $DIST/
          cp README.md $DIST/
          tar -czvf "${DIST}.tar.gz" "$DIST"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: razer-control-*.tar.gz

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            rust cargo pkgconf git \
            dbus libusb hidapi \
            gtk4 libadwaita \
            systemd

      - name: Build
        working-directory: razer_control_gui
        run: cargo build --release

      - name: Package .pkg.tar.zst
        run: |
          PKGVER="${APP_VERSION//-rc/rc}"
          DIST="razer-control-${APP_VERSION}-x86_64"
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/razercontrol
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/scalable/apps
          mkdir -p pkg/usr/lib/systemd/user
          mkdir -p pkg/etc/udev/rules.d

          cp razer_control_gui/target/release/razer-settings pkg/usr/bin/
          cp razer_control_gui/target/release/razer-cli pkg/usr/bin/
          cp razer_control_gui/target/release/daemon pkg/usr/bin/razer-daemon
          cp razer_control_gui/data/devices/laptops.json pkg/usr/share/razercontrol/
          cp razer_control_gui/data/gui/com.encomjp.razer-settings.desktop pkg/usr/share/applications/
          cp razer_control_gui/data/gui/com.github.encomjp.razercontrol.svg pkg/usr/share/icons/hicolor/scalable/apps/
          cp razer_control_gui/data/services/systemd/razercontrol.service pkg/usr/lib/systemd/user/
          cp razer_control_gui/data/udev/99-hidraw-permissions.rules pkg/etc/udev/rules.d/

          cat > pkg/.PKGINFO << EOF
          pkgname = razer-control
          pkgver = ${PKGVER}-1
          pkgdesc = Razer laptop control for Linux
          url = https://github.com/nnfewl/razer-control-revived
          builddate = $(date +%s)
          packager = GitHub Actions
          arch = x86_64
          license = GPL2
          depend = dbus
          depend = hidapi
          depend = gtk4
          depend = libadwaita
          depend = libusb
          EOF
          sed -i 's/^          //' pkg/.PKGINFO

          cd pkg && bsdtar -czf "../razer-control-${APP_VERSION}-1-x86_64.pkg.tar.zst" .

      - name: Upload .pkg.tar.zst
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: razer-control-*.pkg.tar.zst

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-rpm, build-deb, build-tarball, build-arch, check-nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rpm-package/*.rpm
            artifacts/deb-package/*.deb
            artifacts/linux-tarball/*.tar.gz
            artifacts/arch-package/*.pkg.tar.zst
